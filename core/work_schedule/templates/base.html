<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Schedule{% endblock %}</title>

    <!-- Bootstrap (чтобы сразу красиво) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            padding: 20px;
        }

        table {
            font-size: 13px;
        }

        th, td {
            white-space: nowrap;
            text-align: center;
        }

        th:first-child, td:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            background: white;
            z-index: 2;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>

<nav class="mb-3">
    <h4>📅 График смен</h4>
</nav>

<div class="container-fluid">
    {% block content %}{% endblock %}
</div>

</body>
</html>
