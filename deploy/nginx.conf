events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name animatro.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name animatro.ru;

        ssl_certificate /etc/letsencrypt/live/animatro.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/animatro.ru/privkey.pem;

        location /static/ {
            alias /var/www/schedule-static/;
        }

        location /assets/ {
            alias /var/www/schedule-static/;
        }

        location / {
            proxy_pass http://172.18.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 80;
        server_name memo.animatro.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        listen 8448 ssl http2;
        server_name memo.animatro.ru;

        ssl_certificate /etc/letsencrypt/live/memo.animatro.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/memo.animatro.ru/privkey.pem;

        client_max_body_size 20M;

        location / {
            proxy_pass http://matrix-element:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{"m.homeserver":{"base_url":"https://memo.animatro.ru"}}';
        }

        location /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{"m.server":"memo.animatro.ru:443"}';
        }

        location /_matrix/ {
            proxy_pass http://matrix-conduit:6167;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600;
        }
    }
}
